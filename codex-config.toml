model = "gpt-5.4"
# ChatGPTアプリはGUI切り替え不可のため公式(openai)をデフォルトに固定
# 切り替え時は使う行だけ残す(CLIなら`-c model_provider=xxx`でも可)
model_provider = "openai"
# model_provider = "ollama"
# model_provider = "azure-east-us2"
model_reasoning_effort = "high"

approval_policy = "never"
network_access = true
sandbox_mode = "workspace-write"
mcp_oauth_credentials_store = "keyring"

[shell_environment_policy]
# 全自動実行時、生成コマンドへのAPIキー漏出を防ぐ
exclude = ["*_API_KEY", "*_TOKEN", "*_SECRET"]

[model_providers.azure-east-us2]
name = "Azure"
# cp配置後に実URLへ手動置換(変数展開はされない)
base_url = "{AZURE_FOUNDRY_BASE_URL}"
env_key = "MICROSOFT_FOUNDRY_API_KEY"

[windows]
sandbox = "elevated"

[features]
js_repl = false
memories = true

[memories]
generate_memories = true
use_memories = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."visualize@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true
